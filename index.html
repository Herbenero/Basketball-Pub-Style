<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basketball Darts - Pub Style</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
  <style>
    :root {
      --bg-color: #111827;
      --background-body: #111827;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --links: #3b82f6;
      --focus: #2563eb;
      --form-placeholder: #4b5563;
      --button-base: #1f2937;
      --button-hover: #374151;
      --animation-duration: 0.2s;
    }
    body {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: var(--bg-color);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 1px solid #374151;
      padding-bottom: 20px;
    }
    .header-titles h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(to right, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .eyebrow {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin: 0 0 4px 0;
    }
    .panel {
      background: #1f2937;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid #374151;
    }
    .hidden { display: none !important; }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }
    .section-title {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 0.9rem;
    }
    input, select {
      width: 100%;
      padding: 10px;
      background: #111827;
      border: 1px solid #4b5563;
      border-radius: 6px;
      color: white;
      box-sizing: border-box;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background var(--animation-duration);
    }
    .btn.primary { background: #f97316; color: white; }
    .btn.primary:hover { background: #ea580c; }
    .btn.secondary { background: #4b5563; color: white; }
    .btn.secondary:hover { background: #374151; }
    .btn.warn { background: #dc2626; color: white; }
    .btn.warn:hover { background: #b91c1c; }
    .btn.ghost { background: transparent; border: 1px solid #4b5563; color: var(--text-main); }
    .btn.ghost:hover { background: #27272a; }
    
    .player-setup-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    .player-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111827;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    .game-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }
    @media (max-width: 800px) {
      .game-layout { grid-template-columns: 1fr; }
    }
    
    .scoreboard-table {
      width: 100%;
      border-collapse: collapse;
    }
    .scoreboard-table th, .scoreboard-table td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #374151;
    }
    .scoreboard-table th { background: #111827; color: var(--text-muted); }
    .scoreboard-table tr.active-row td { background: rgba(249, 115, 22, 0.1); border-left: 4px solid #f97316; }
    
    .quarter-box {
      display: inline-block;
      padding: 2px 6px;
      background: #374151;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .possession-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #f97316;
      border-radius: 50%;
      margin-left: 6px;
    }
    
    .selection {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .multiplier-row, .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill-btn {
      flex: 1;
      min-width: 70px;
      padding: 12px 8px;
      background: #111827;
      border: 1px solid #4b5563;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      text-align: center;
    }
    .pill-btn.active {
      background: #f97316;
      border-color: #f97316;
    }
    
    .stats-summary {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0; pointer-events: none;
      transition: opacity var(--animation-duration);
    }
    .modal:not([aria-hidden="true"]) { opacity: 1; pointer-events: auto; }
    .modal-card {
      background: #1f2937;
      padding: 24px;
      border-radius: 12px;
      max-width: 500px;
      width: 90%;
      border: 1px solid #374151;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
    }
    .leaderboard-table th, .leaderboard-table td {
      padding: 8px;
      font-size: 0.9rem;
      border-bottom: 1px solid #374151;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-titles">
      <p class="eyebrow">Darts Format</p>
      <h1>Basketball</h1>
    </div>
    <div>
      <button class="btn ghost" id="viewLeaderboardBtn">Leaderboard</button>
    </div>
  </header>

  <main>
    <!-- SETUP PANEL -->
    <section class="panel" id="setupPanel">
      <h2 class="section-title">New Match Configuration</h2>
      <div class="grid-2">
        <div>
          <div class="form-group">
            <label for="matchType">Match Rules Setup</label>
            <select id="matchType">
              <option value="standard">4 Quarters (Standard Rules)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Add Players to Match</label>
            <div class="player-setup-row">
              <input type="text" id="playerNameInput" placeholder="Enter name...">
              <button class="btn primary" id="addPlayerBtn">Add</button>
            </div>
          </div>
        </div>
        <div>
          <label>Current Match Roster</label>
          <div id="rosterContainer" style="margin-bottom: 16px;">
            <!-- Dynamic list of added players -->
          </div>
          <button class="btn primary" id="startMatchBtn" style="width: 100%;" disabled>Start Match</button>
        </div>
      </div>
    </section>

    <!-- LIVE GAME PANEL -->
    <section class="panel game hidden" id="gamePanel">
      <div class="game-layout">
        <!-- Scoreboard Table View -->
        <div style="overflow-x: auto;">
          <table class="scoreboard-table">
            <thead>
              <tr>
                <th style="text-align: left;">Player</th>
                <th>Q1</th>
                <th>Q2</th>
                <th>Q3</th>
                <th>Q4</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody id="scoreboardBody">
              <!-- Live rows -->
            </tbody>
          </table>
          <div id="turnIndicatorContainer" style="margin-top: 16px; font-weight: 500;">
            <!-- Whos throwing -->
          </div>
        </div>

        <!-- Controls View -->
        <div class="selection">
          <div>
            <p class="eyebrow" style="font-size:.72rem;">Segment</p>
            <div class="multiplier-row" id="multiplierRow">
              <button class="pill-btn" data-multiplier="bull">Bull</button>
              <button class="pill-btn active" data-multiplier="outer_single">Outer Single</button>
              <button class="pill-btn" data-multiplier="inner_single">Inner Single</button>
              <button class="pill-btn" data-multiplier="2">Double</button>
              <button class="pill-btn" data-multiplier="3">Triple</button>
            </div>
          </div>
          <div>
            <p class="eyebrow" style="font-size:.72rem;">Actions</p>
            <div class="action-row">
              <button class="btn ghost" id="missBtn">Miss</button>
              <button class="btn secondary" id="undoBtn">Undo</button>
              <button class="btn warn" id="newGameBtn">New Game</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- MODALS -->
  <div class="modal" id="quarterModal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <p class="eyebrow">Quarter Complete</p>
          <h2 class="section-title">Quarter MVP</h2>
        </div>
        <button class="btn ghost" id="closeQuarterModal">Close</button>
      </div>
      <div id="quarterMVPContent"></div>
    </div>
  </div>

  <div class="modal" id="finalModal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <p class="eyebrow">Game Complete</p>
          <h2 class="section-title">Final Scoreboard</h2>
        </div>
        <button class="btn ghost" id="closeFinalModal">Close</button>
      </div>
      <div id="finalContent"></div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
        <button class="btn primary" id="submitFinishedGameBtn">Submit Game</button>
        <button class="btn warn" id="discardFinishedGameBtn">Discard</button>
      </div>
    </div>
  </div>

  <div class="modal" id="leaderboardModal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <p class="eyebrow">Player Ratings</p>
          <h2 class="section-title">Leaderboard Details</h2>
        </div>
        <button class="btn ghost" id="closeLeaderboardModal">Close</button>
      </div>
      <div style="overflow: auto;">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Wins</th>
              <th>Losses</th>
              <th>Win %</th>
              <th>Elo</th>
              <th>Marks</th>
              <th>Rounds</th>
              <th>PPG</th>
              <th>PPQ</th>
            </tr>
          </thead>
          <tbody id="leaderboardModalBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEYS = {
      activeGame: 'basketball_darts_active_v1',
      history: 'basketball_darts_history_v1',
      leaderboard: 'basketball_darts_leaderboard_v1'
    };

    const SCORING = {
      miss: 0,
      outer_single: 1,
      inner_single: 1,
      bull: 2,
      2: 2,
      3: 3
    };

    let players = [];
    let gameState = null;

    // Dom Elements
    const setupPanel = document.getElementById('setupPanel');
    const gamePanel = document.getElementById('gamePanel');
    const playerNameInput = document.getElementById('playerNameInput');
    const addPlayerBtn = document.getElementById('addPlayerBtn');
    const rosterContainer = document.getElementById('rosterContainer');
    const startMatchBtn = document.getElementById('startMatchBtn');
    const scoreboardBody = document.getElementById('scoreboardBody');
    const turnIndicatorContainer = document.getElementById('turnIndicatorContainer');
    const multiplierRow = document.getElementById('multiplierRow');
    const missBtn = document.getElementById('missBtn');
    const undoBtn = document.getElementById('undoBtn');
    const newGameBtn = document.getElementById('newGameBtn');
    const viewLeaderboardBtn = document.getElementById('viewLeaderboardBtn');
    
    // Modals
    const quarterModal = document.getElementById('quarterModal');
    const quarterMVPContent = document.getElementById('quarterMVPContent');
    const closeQuarterModal = document.getElementById('closeQuarterModal');
    const finalModal = document.getElementById('finalModal');
    const finalContent = document.getElementById('finalContent');
    const closeFinalModal = document.getElementById('closeFinalModal');
    const submitFinishedGameBtn = document.getElementById('submitFinishedGameBtn');
    const discardFinishedGameBtn = document.getElementById('discardFinishedGameBtn');
    const leaderboardModal = document.getElementById('leaderboardModal');
    const leaderboardModalBody = document.getElementById('leaderboardModalBody');
    const closeLeaderboardModal = document.getElementById('closeLeaderboardModal');

    // Setup Actions
    addPlayerBtn.addEventListener('click', () => {
      const name = playerNameInput.value.trim();
      if (!name) return;
      if (players.includes(name)) {
        alert('Player already added');
        return;
      }
      players.push(name);
      playerNameInput.value = '';
      renderRoster();
    });

    playerNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addPlayerBtn.click();
    });

    function renderRoster() {
      rosterContainer.innerHTML = '';
      players.forEach((p, idx) => {
        const div = document.createElement('div');
        div.className = 'player-list-item';
        div.innerHTML = `
          <span>${p}</span>
          <button class="btn ghost" style="padding:4px 8px; color:#ef4444; border-color:#7f1d1d;" onclick="removePlayer(${idx})">Remove</button>
        `;
        rosterContainer.appendChild(div);
      });
      startMatchBtn.disabled = players.length < 1;
    }

    window.removePlayer = function(idx) {
      players.splice(idx, 1);
      renderRoster();
    };

    startMatchBtn.addEventListener('click', () => {
      if (players.length < 1) return;
      initGame(players);
    });

    // Game Core
    function initGame(playerNames) {
      gameState = {
        players: playerNames.map(name => ({
          name,
          quarters: [0, 0, 0, 0],
          stats: { marks: 0, rounds: 0 }
        })),
        currentQuarter: 0, // 0 = Q1, 1 = Q2...
        currentPlayerIdx: 0,
        dartsInRound: 0,
        history: [] // stack for undoing individual darts
      };
      saveState();
      showPanel('game');
      renderScoreboard();
    }

    function showPanel(panel) {
      if (panel === 'setup') {
        setupPanel.classList.remove('hidden');
        gamePanel.classList.add('hidden');
      } else {
        setupPanel.classList.add('hidden');
        gamePanel.classList.remove('hidden');
      }
    }

    function renderScoreboard() {
      if (!gameState) return;
      scoreboardBody.innerHTML = '';
      
      gameState.players.forEach((p, idx) => {
        const tr = document.createElement('tr');
        if (idx === gameState.currentPlayerIdx) tr.className = 'active-row';
        
        const total = p.quarters.reduce((a, b) => a + b, 0);
        
        tr.innerHTML = `
          <td style="text-align: left; font-weight: 600;">
            ${p.name} ${idx === gameState.currentPlayerIdx ? '<span class="possession-dot"></span>' : ''}
            <div class="stats-summary">Marks: ${p.stats.marks} | Rds: ${p.stats.rounds}</div>
          </td>
          <td>${p.quarters[0]}</td>
          <td>${p.quarters[1]}</td>
          <td>${p.quarters[2]}</td>
          <td>${p.quarters[3]}</td>
          <td style="font-weight: bold; color: #f97316;">${total}</td>
        `;
        scoreboardBody.appendChild(tr);
      });

      const currentActivePlayer = gameState.players[gameState.currentPlayerIdx];
      const remainingDarts = 3 - gameState.dartsInRound;
      turnIndicatorContainer.innerHTML = `
        <span class="quarter-box">Q${gameState.currentQuarter + 1}</span> 
        <span style="margin-left: 8px; color: #f97316; font-weight: bold;">${currentActivePlayer.name}'s turn</span> 
        <span style="color: var(--text-muted); font-size: 0.9rem;">(${remainingDarts} Darts Left)</span>
      `;
    }

    // Input Controller Layout Configuration Interaction Layer
    multiplierRow.addEventListener('click', (e) => {
      if (!e.target.classList.contains('pill-btn')) return;
      Array.from(multiplierRow.children).forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      
      // Automatically register the scoring mark when a segment pill is pressed
      const mult = e.target.getAttribute('data-multiplier');
      handleScoringInput(mult);
    });

    missBtn.addEventListener('click', () => handleScoringInput('miss'));

    function handleScoringInput(multiplier) {
      if (!gameState) return;

      const p = gameState.players[gameState.currentPlayerIdx];
      const points = SCORING[multiplier] || 0;

      // Deep record action frame for reversal stability
      gameState.history.push({
        playerIdx: gameState.currentPlayerIdx,
        quarterIdx: gameState.currentQuarter,
        points: points,
        dartsCount: gameState.dartsInRound,
        hadMarks: points > 0
      });

      // Frame Calculation Mutation Strategy
      p.quarters[gameState.currentQuarter] += points;
      if (points > 0) p.stats.marks += points;

      gameState.dartsInRound++;

      if (gameState.dartsInRound >= 3) {
        p.stats.rounds++;
        gameState.dartsInRound = 0;
        gameState.currentPlayerIdx++;

        if (gameState.currentPlayerIdx >= gameState.players.length) {
          gameState.currentPlayerIdx = 0;
          
          // Complete entire configuration round iteration inside target rules matrix
          if (isQuarterComplete()) {
            triggerQuarterBreak();
          }
        }
      }

      saveState();
      renderScoreboard();
    }

    function isQuarterComplete() {
      // Simple loop configuration tracking validation mapping
      return false; 
    }

    function triggerQuarterBreak() {
      // Show summary modals
    }

    undoBtn.addEventListener('click', () => {
      if (!gameState || gameState.history.length === 0) return;
      const last = gameState.history.pop();
      
      const p = gameState.players[last.playerIdx];
      p.quarters[last.quarterIdx] -= last.points;
      if (last.hadMarks) p.stats.marks -= last.points;

      gameState.currentPlayerIdx = last.playerIdx;
      gameState.currentQuarter = last.quarterIdx;
      gameState.dartsInRound = last.dartsCount;

      if (last.dartsCount === 0 && last.points > 0) {
        // Correct round adjustments framework if needed
      }

      saveState();
      renderScoreboard();
    });

    newGameBtn.addEventListener('click', () => {
      if (confirm('Are you sure you want to completely clear this active round?')) {
        localStorage.removeItem(STORAGE_KEYS.activeGame);
        players = [];
        renderRoster();
        showPanel('setup');
      }
    });

    function saveState() {
      localStorage.setItem(STORAGE_KEYS.activeGame, JSON.stringify(gameState));
    }

    // Initial Bootstrap
    (function init() {
      const saved = localStorage.getItem(STORAGE_KEYS.activeGame);
      if (saved) {
        try {
          gameState = JSON.parse(saved);
          showPanel('game');
          renderScoreboard();
        } catch(e) {
          showPanel('setup');
        }
      } else {
        showPanel('setup');
      }
    })();
  </script>
</body>
</html>
